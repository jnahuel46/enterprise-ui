const s = "\ndigraph {\n\tcompound = \"true\"\n\tnewrank = \"true\"\n\tsubgraph \"root\" {\n\t\t\"[root] @pulse/analytics#build\" -\u003E \"[root] @pulse/shared#build\"\n\t\t\"[root] @pulse/analytics#build\" -\u003E \"[root] @pulse/ui#build\"\n\t\t\"[root] @pulse/codemods#build\" -\u003E \"[root] ___ROOT___\"\n\t\t\"[root] @pulse/dashboard#build\" -\u003E \"[root] @pulse/analytics#build\"\n\t\t\"[root] @pulse/dashboard#build\" -\u003E \"[root] @pulse/mocks#build\"\n\t\t\"[root] @pulse/dashboard#build\" -\u003E \"[root] @pulse/shared#build\"\n\t\t\"[root] @pulse/dashboard#build\" -\u003E \"[root] @pulse/ui#build\"\n\t\t\"[root] @pulse/dashboard#build\" -\u003E \"[root] @pulse/users#build\"\n\t\t\"[root] @pulse/legacy#build\" -\u003E \"[root] @pulse/mocks#build\"\n\t\t\"[root] @pulse/mocks#build\" -\u003E \"[root] @pulse/shared#build\"\n\t\t\"[root] @pulse/shared#build\" -\u003E \"[root] ___ROOT___\"\n\t\t\"[root] @pulse/ui#build\" -\u003E \"[root] @pulse/shared#build\"\n\t\t\"[root] @pulse/users#build\" -\u003E \"[root] @pulse/shared#build\"\n\t\t\"[root] @pulse/users#build\" -\u003E \"[root] @pulse/ui#build\"\n\t}\n}\n\n".replace(/\_\_\_ROOT\_\_\_/g, "Root").replace(/\[root\]/g, "");new Viz().renderSVGElement(s).then(el => document.body.appendChild(el)).catch(e => console.error(e));
  </script>
